name: Unity Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: unity-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  editmode-tests:
    name: EditMode tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/packages-lock.json', 'Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-
            Library-

      - name: Run Unity EditMode tests
        id: unity-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 2022.3.43f1
          testMode: editmode
          artifactsPath: artifacts/editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity EditMode Test Results

      - name: Upload Unity test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-editmode-test-results
          path: artifacts/editmode
          if-no-files-found: warn
